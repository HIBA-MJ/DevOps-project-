apiVersion: batch/v1
kind: Job
metadata:
  name: devops-job
spec:
  template:
    spec:
      containers:
      - name: devops-container
        image: devops-project
        imagePullPolicy: Never
        command: ["python", "app/process.py"]
        volumeMounts:
        - name: data-volume
          mountPath: /app/data
      restartPolicy: Never
      volumes:
      - name: data-volume
        hostPath:
          path: /opt/devops-project/data
  backoffLimit: 2
